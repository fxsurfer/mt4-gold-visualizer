function download() {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  const blob = new Blob([svgStr], {type: 'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  img.onload = function() {
    ctx.fillStyle = '#0f1117';
    ctx.fillRect(0, 0, 820, 460);
    ctx.drawImage(img, 0, 0, 820, 460);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.download = 'gogojungle_thumbnail.jpg';
    a.href = canvas.toDataURL('image/jpeg', 0.95);
    a.click();
    document.querySelector('h2').textContent = 'ダウンロード完了！';
    document.querySelector('p').textContent = 'gogojungle_thumbnail.jpg を保存してゴゴジャンにアップしてください';
  };
  img.src = url;
}
